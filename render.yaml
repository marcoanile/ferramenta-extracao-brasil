services:
  - type: web
    name: nexus-accounting
    runtime: python
    pythonVersion: "3.12.0"
    buildCommand: pip install -r backend/requirements.txt
    startCommand: cd backend && gunicorn app:app -c gunicorn.conf.py
    envVars:
      - key: DATA_DIR
        value: /data
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "false"
    disk:
      name: nexus-data
      mountPath: /data
      sizeGB: 1
